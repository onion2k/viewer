<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Local Image Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="toolbar">
      <button id="selectFolderBtn" type="button">Select Folder</button>
      <button id="deleteBtn" type="button" disabled hidden>Delete Image</button>
      <button id="moveBtn" type="button" disabled hidden>Move image</button>
      <button id="changeMoveFolderBtn" type="button" disabled hidden>Change move folder</button>
      <input id="folderInput" type="file" webkitdirectory directory multiple hidden />
      <p id="statusText" class="status">No folder selected.</p>
      <div class="sort-control">
        <label for="orderSelect">Order</label>
        <select id="orderSelect">
          <option value="created-desc" selected>Newest first</option>
          <option value="created-asc">Oldest first</option>
          <option value="name-asc">Name A-Z</option>
          <option value="name-desc">Name Z-A</option>
        </select>
      </div>
    </header>

    <main class="viewer">
      <button id="firstBtn" class="nav nav-left nav-skip" type="button" aria-label="First image">
        &#171;
      </button>
      <button id="prevBtn" class="nav nav-left" type="button" aria-label="Previous image">
        &#10094;
      </button>

      <img id="leftPreviewEl" class="side-preview side-preview-left" alt="" />

      <section id="stage" class="stage" aria-live="polite">
        <div class="stage-topbar">
          <div class="tab-bar" role="tablist" aria-label="Viewer tabs">
            <button id="imageTabBtn" class="tab-btn" type="button" role="tab" aria-selected="true" aria-controls="imageTabPanel">
              Image
            </button>
            <button id="dataTabBtn" class="tab-btn" type="button" role="tab" aria-selected="false" aria-controls="dataTabPanel">
              File data
            </button>
          </div>
          <div class="size-controls" role="group" aria-label="Image size mode">
            <button id="actualSizeBtn" class="size-btn" type="button" aria-pressed="false">Actual size</button>
            <button id="coverSizeBtn" class="size-btn" type="button" aria-pressed="false">Cover</button>
            <button id="fitSizeBtn" class="size-btn" type="button" aria-pressed="true">Fit</button>
          </div>
          <div class="curation-controls" role="group" aria-label="Curation actions">
            <button id="moveInboxBtn" class="curation-btn" type="button" disabled>Inbox (1)</button>
            <button id="moveSelectedBtn" class="curation-btn" type="button" disabled>Selected (2)</button>
            <button id="moveRejectsBtn" class="curation-btn" type="button" disabled>Rejects (3)</button>
            <button id="moveHoldBtn" class="curation-btn" type="button" disabled>Hold (4)</button>
            <button id="undoMoveBtn" class="curation-btn" type="button" disabled>Undo (U)</button>
          </div>
        </div>
        <div class="session-controls">
          <label for="sessionFlagSelect">Session flag</label>
          <select id="sessionFlagSelect">
            <option value="none" selected>None</option>
            <option value="pick">Pick</option>
            <option value="review">Review</option>
            <option value="reject">Reject</option>
          </select>
          <label for="sessionRatingSelect">Rating</label>
          <select id="sessionRatingSelect">
            <option value="-1" selected>Unrated</option>
            <option value="0">0</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
          </select>
          <label for="sessionFilterSelect">Filter</label>
          <select id="sessionFilterSelect">
            <option value="all" selected>All</option>
            <option value="pick">Flag: Pick</option>
            <option value="review">Flag: Review</option>
            <option value="reject">Flag: Reject</option>
            <option value="rated">Rated only</option>
            <option value="unrated">Unrated only</option>
          </select>
          <input id="sessionNoteInput" type="text" placeholder="Session note (not saved)" />
        </div>
        <p id="workflowStatsEl" class="workflow-stats"></p>
        <div id="auditLogEl" class="audit-log" aria-live="polite"></div>

        <section id="imageTabPanel" class="tab-panel tab-panel-image" role="tabpanel" aria-labelledby="imageTabBtn">
          <div id="imageArea" class="image-area">
            <img id="imageEl" alt="" />
          </div>
          <p id="filenameEl" class="filename"></p>
        </section>

        <section id="dataTabPanel" class="tab-panel tab-panel-data" role="tabpanel" aria-labelledby="dataTabBtn" hidden>
          <p id="dataFilenameEl" class="filename data-filename"></p>
          <div id="exifPanel" class="exif-panel">
            <table id="exifTable" class="exif-table" aria-label="EXIF metadata">
              <tbody id="exifBody"></tbody>
            </table>
          </div>
        </section>
      </section>

      <img id="rightPreviewEl" class="side-preview side-preview-right" alt="" />

      <button id="nextBtn" class="nav nav-right" type="button" aria-label="Next image">
        &#10095;
      </button>
      <button id="lastBtn" class="nav nav-right nav-skip" type="button" aria-label="Last image">
        &#187;
      </button>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
